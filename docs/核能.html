<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能源早报 · 海外能源资讯聚合</title>
  <meta name="description" content="自动聚合全球能源领域最新资讯，涵盖太阳能、风电、储能、氢能、EV、油气、核能等领域">
  <style>
    :root {
      --bg: #f6f7f9;
      --card-bg: #ffffff;
      --border: #e8eaed;
      --text: #1a1a2e;
      --muted: #6b7280;
      --accent: #0ea5e9;
      --accent-hover: #0284c7;
      --tag-bg: #f0f9ff;
      --tag-text: #0369a1;
      --header-bg: #0f172a;
      --header-text: #f8fafc;
      --nav-active: #38bdf8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── 顶栏 ── */
    header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 52px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #38bdf8;
      text-decoration: none;
      white-space: nowrap;
      letter-spacing: -0.5px;
    }
    .logo span { color: #f8fafc; font-weight: 400; }
    .header-meta {
      font-size: 12px;
      color: #94a3b8;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── 分类导航 ── */
    .nav-wrap {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 52px;
      z-index: 99;
      overflow-x: auto;
    }
    .nav-wrap::-webkit-scrollbar { display: none; }
    nav {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 0;
      padding: 0 8px;
    }
    nav a {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    nav a .count {
      font-size: 11px;
      color: #94a3b8;
      margin-left: 3px;
    }

    /* ── 主内容 ── */
    main {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 16px;
    }

    /* ── 文章列表 ── */
    .article-list { display: flex; flex-direction: column; gap: 0; }

    /* 按日期分组标题 */
    .date-group-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    /* 文章行 */
    .article-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f1f3f4;
      transition: background 0.1s;
    }
    .article-item:hover { background: #fafbfc; margin: 0 -16px; padding: 10px 16px; }

    .article-meta {
      flex-shrink: 0;
      width: 44px;
      text-align: right;
    }
    .article-time {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .article-body { flex: 1; min-width: 0; }

    .article-title-zh {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      display: block;
      line-height: 1.5;
    }
    .article-title-zh:hover { color: var(--accent); }

    .article-title-en {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .article-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .source-tag {
      font-size: 11px;
      color: var(--tag-text);
      background: var(--tag-bg);
      padding: 1px 7px;
      border-radius: 20px;
      text-decoration: none;
      border: 1px solid #bae6fd;
    }
    .cat-tag {
      font-size: 11px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 1px 7px;
      border-radius: 20px;
    }

    /* 空状态 */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 80px 0;
      font-size: 15px;
    }

    /* ── 底栏 ── */
    footer {
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
      padding: 40px 16px 60px;
    }
    footer a { color: #6b7280; }

    /* ── 移动端适配 ── */
    @media (max-width: 600px) {
      .article-title-en { display: none; }
      .header-meta { display: none; }
    }
  </style>
</head>
