name: Fetch & Deploy Energy News

on:
  schedule:
    # 每3小时执行一次（UTC时间，对应北京时间 1:00/4:00/7:00/10:00/13:00/16:00/19:00/22:00）
    - cron: '0 */3 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch, translate & build
        env:
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python fetch.py

      - name: Commit & push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          # 只有内容有变化才提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
